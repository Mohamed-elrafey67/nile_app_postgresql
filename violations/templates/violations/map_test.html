{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اختبار الخريطة</title>
  <link rel="stylesheet" href="{% static 'violations/libs/leaflet/leaflet.css' %}"/>
  <script src="{% static 'violations/libs/leaflet/leaflet.js' %}"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    #map { width: 100%; height: 100vh; background: #eee; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    console.log("Leaflet version:", L.version);

    var map = L.map('map').setView([30.0, 31.0], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    L.marker([30.0361, 31.3807])
      .addTo(map)
      .bindPopup('المنصورة — الدقهلية')
      .openPopup();

    console.log("Map initialized successfully!");
  </script>
</body>
</html>
