<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — منظومة توثيق أراضي طرح النهر</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0d3b6e 0%, #1a6ea8 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo i { font-size: 3rem; color: #1a6ea8; }
    .logo h1 { font-size: 1.1rem; color: #0d3b6e; margin-top: 8px; line-height: 1.4; }
    .logo small { font-size: .75rem; color: #888; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #444; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d0d7e3; border-radius: 8px;
      font-size: .9rem; font-family: inherit; outline: none; transition: border .2s;
    }
    input:focus { border-color: #1a6ea8; }
    .btn-login {
      width: 100%; padding: 12px; background: linear-gradient(135deg,#0d3b6e,#1a6ea8);
      color: #fff; border: none; border-radius: 8px; font-size: .95rem;
      font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; }
    .error {
      background: #fde8e8; color: #c0392b; padding: 10px 14px;
      border-radius: 8px; font-size: .83rem; margin-bottom: 16px;
      border: 1px solid #f5c6cb;
    }
    .footer { text-align: center; margin-top: 20px; font-size: .75rem; color: #aaa; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="card">
    <div class="logo">
      <i class="fa fa-water"></i>
      <h1>منظومة توثيق أراضي طرح النهر</h1>
      <small>وزارة الموارد المائية والري</small>
    </div>

    {% if error %}
    <div class="error"><i class="fa fa-circle-exclamation"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>اسم المستخدم</label>
        <input type="text" name="username" placeholder="أدخل اسم المستخدم" autofocus required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" name="password" placeholder="أدخل كلمة المرور" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa fa-right-to-bracket"></i> تسجيل الدخول
      </button>
    </form>

    <div class="footer">جمهورية مصر العربية &copy; {{ year }}</div>
  </div>

  <script>
    document.querySelector('form').addEventListener('submit', function() {
      document.querySelector('.btn-login').innerHTML = '<i class="fa fa-spinner fa-spin"></i> جاري الدخول…';
    });
    // Set year
    document.querySelector('.footer').innerHTML =
      'جمهورية مصر العربية &copy; ' + new Date().getFullYear();
  </script>
</body>
</html>
